<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostLink Pro - Générateur LinkedIn IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

  <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <span class="text-2xl">✍️</span>
        <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">PostLink Pro</span>
      </div>
      <span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20">Version 2.0</span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8 flex-grow w-full">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
      
      <form id="generatorForm" class="md:col-span-5 space-y-5 bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
        <h2 class="text-lg font-semibold text-slate-200 mb-2">Configuration du Post</h2>
        
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Sujet principal / Idée</label>
          <textarea id="sujet" required rows="3" placeholder="Ex: 5 conseils pour réussir ses campagnes d'emails froids..." class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition resize-none"></textarea>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Ton appliqué</label>
          <select id="tonifier" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-blue-500">
            <option value="histoire">Storytelling (Récit captivant)</option>
            <option value="expert">Expert / Analytique (Données & Méthodes)</option>
            <option value="persuasif">Persuasif & Vendeur</option>
            <option value="minimaliste">Minimaliste (Court & Épuré)</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Audience cible</label>
          <select id="audience" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-blue-500">
            <option value="entrepreneurs">Entrepreneurs / Fondateurs</option>
            <option value="recruteurs">Recruteurs / RH</option>
            <option value="leads">Clients potentiels (B2B)</option>
            <option value="general">Grand public / Communauté</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Formule de Copywriting</label>
          <select id="structure" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-blue-500">
            <option value="aida">AIDA (Attention, Intérêt, Désir, Action)</option>
            <option value="pas">PAS (Problème, Agitation, Solution)</option>
            <option value="standard">Standard (Classique efficace)</option>
          </select>
        </div>

        <div class="flex items-center justify-between pt-2">
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="checkbox" id="emojis" checked class="rounded bg-slate-950 border-slate-800 text-blue-500 focus:ring-0 focus:ring-offset-0">
            <span class="text-xs text-slate-300">Emojis</span>
          </label>
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="checkbox" id="hashtags" class="rounded bg-slate-950 border-slate-800 text-blue-500 focus:ring-0 focus:ring-offset-0">
            <span class="text-xs text-slate-300">Hashtags finaux</span>
          </label>
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm shadow-lg hover:shadow-indigo-500/10 transition flex justify-center items-center space-x-2">
          <span>Générer le Post</span>
        </button>
      </form>

      <div class="md:col-span-7 flex flex-col space-y-4">
        <div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-xl flex-grow flex flex-col min-h-[400px]">
          
          <div class="border-b border-slate-800 px-5 py-3 flex justify-between items-center bg-slate-900/50 rounded-t-2xl">
            <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Aperçu du Post</span>
            <button id="copyBtn" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-md transition flex items-center space-x-1">
              <span>Copier</span>
            </button>
          </div>
          
          <div class="p-6 flex-grow flex flex-col justify-center relative">
            <div id="loader" class="hidden absolute inset-0 bg-slate-900/90 rounded-b-2xl flex flex-col items-center justify-center space-y-3 z-10">
              <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
              <p class="text-xs text-slate-400">Rédaction professionnelle en cours...</p>
            </div>
            
            <div id="output" class="text-slate-300 text-sm whitespace-pre-line leading-relaxed overflow-y-auto max-h-[450px]">
              Votre futur post LinkedIn apparaîtra ici. Configurez les options à gauche et lancez la génération.
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="border-t border-slate-900 py-4 bg-slate-950/80">
    <div class="max-w-5xl mx-auto px-4 text-center text-xs text-slate-600">
      PostLink Pro © 2026 — Outil d'aide à la création de contenu propulsé par Groq & Vercel.
    </div>
  </footer>

  <script>
    const form = document.getElementById('generatorForm');
    const output = document.getElementById('output');
    const loader = document.getElementById('loader');
    const submitBtn = document.getElementById('submitBtn');
    const copyBtn = document.getElementById('copyBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Activation du mode chargement
      loader.classList.remove('hidden');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50');

      const payload = {
        sujet: document.getElementById('sujet').value,
        tonifier: document.getElementById('tonifier').value,
        audience: document.getElementById('audience').value,
        structure: document.getElementById('structure').value,
        emojis: document.getElementById('emojis').checked,
        hashtags: document.getElementById('hashtags').checked
      };

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('Erreur serveur lors de la génération.');
        }

        const data = await response.json();
        
        // Extraction de la réponse propre
        if (data && data.choices && data.choices[0] && data.choices[0].message) {
          output.textContent = data.choices[0].message.content.trim();
        } else {
          output.textContent = "Une erreur inattendue est survenue dans le format de la réponse de l'IA.";
        }
      } catch (error) {
        output.textContent = `Erreur: ${error.message}. Vérifiez la console pour plus d'informations.`;
      } finally {
        loader.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50');
      }
    });

    // Option de Copie Rapide
    copyBtn.addEventListener('click', () => {
      const textToCopy = output.textContent;
      if (textToCopy && !textToCopy.startsWith("Votre futur post") && !textToCopy.startsWith("Erreur")) {
        navigator.clipboard.writeText(textToCopy);
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = "<span>Copié ! ✅</span>";
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
        }, 2000);
      }
    });
  </script>
</body>
</html>
